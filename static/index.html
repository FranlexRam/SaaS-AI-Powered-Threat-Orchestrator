<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sakti Shield | Dashboard SOC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-6">Centro de Operaciones de Seguridad</h1>
    
    <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-slate-800 p-4 rounded h-64">
            <canvas id="attackChart"></canvas>
        </div>
        
        <div class="bg-slate-800 p-4 rounded h-64 flex flex-col">
            <h2 class="text-xl mb-4">Eventos en tiempo real</h2>
            <div id="eventLog" class="overflow-y-auto flex-grow space-y-2">
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
